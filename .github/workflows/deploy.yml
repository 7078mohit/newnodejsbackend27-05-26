name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
           export NVM_DIR="/root/.nvm"
           source /root/.nvm/nvm.sh

           cd /var/www/kalpjyotish-backend

           git pull origin main

           npm install

           pm2 restart backend



